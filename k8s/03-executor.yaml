apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdo-executor
  namespace: self-heal-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdo-self-heal-controller
  template:
    metadata:
      labels:
        app: cdo-self-heal-controller
    spec:
      serviceAccountName: tf3-cdo-controller
      containers:
        - name: executor
          image: 012619468490.dkr.ecr.us-east-1.amazonaws.com/cdo-executor:v4
          command: ["python", "main.py", "--watch"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AI_BASE_URL
              value: "http://ai-engine.self-heal-system.svc.cluster.local:8080"
            - name: CDO_K8S_MOCK
              value: "false"
            - name: AWS_REGION
              value: "us-east-1"
            - name: CDO_AUDIT_BUCKET
              value: cdo-audit-012619468490-dev
            - name: CDO_IDEMPOTENCY_TABLE
              value: "cdo-idempotency-dev"
            - name: CDO_TENANT_NAMESPACES
              value: "tenant-a,tenant-b"
            # Nguồn telemetry chính (SQS buffer ← Forwarder). Rỗng → fallback poll K8s 30s.
            - name: CDO_TELEMETRY_QUEUE_URL
              value: https://sqs.us-east-1.amazonaws.com/012619468490/cdo-telemetry-dev
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
