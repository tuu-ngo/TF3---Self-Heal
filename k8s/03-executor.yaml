apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdo-executor
  namespace: self-heal-system
spec:
  replicas: 1
  # Recreate: kill pod cũ trước rồi tạo mới — chỉ 1 executor chạy 1 lúc (controller),
  # và tránh cần +1 pod-slot khi rollout (t3.medium giới hạn ~17 pod/node).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cdo-self-heal-controller
  template:
    metadata:
      labels:
        app: cdo-self-heal-controller
    spec:
      serviceAccountName: tf3-cdo-controller
      containers:
        - name: executor
          image: 012619468490.dkr.ecr.us-east-1.amazonaws.com/cdo-executor:v8
          command: ["python", "main.py", "--watch"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AI_BASE_URL
              value: "http://ai-engine.self-heal-system.svc.cluster.local:8080"
            - name: CDO_K8S_MOCK
              value: "false"
            - name: AWS_REGION
              value: "us-east-1"
            - name: CDO_AUDIT_BUCKET
              value: cdo-audit-012619468490-dev
            - name: CDO_AUDIT_LOG_GROUP
              value: /cdo/dev/audit
            - name: CDO_IDEMPOTENCY_TABLE
              value: "cdo-idempotency-dev"
            - name: CDO_TENANT_NAMESPACES
              value: "tenant-a,tenant-b"
            # Nguồn telemetry chính (SQS buffer ← Forwarder). Rỗng → fallback poll K8s 30s.
            - name: CDO_TELEMETRY_QUEUE_URL
              value: https://sqs.us-east-1.amazonaws.com/012619468490/cdo-telemetry-dev
            # Prometheus dense-window: mỗi incident, executor query metric dày → detect.
            - name: CDO_PROMETHEUS_URL
              value: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            - name: CDO_PROM_WINDOW_S
              value: "3600"
            - name: CDO_PROM_STEP_S
              value: "15"
            # Engine thật (BOCPD/BARO trên dense-window) xử lâu hơn mock → nới timeout detect
            # (SLA contract 300ms là target của AI; thực tế BARO RCA vài giây).
            - name: AI_TIMEOUT_DETECT_S
              value: "15"
            - name: AI_TIMEOUT_DECIDE_S
              value: "15"
            - name: AI_TIMEOUT_VERIFY_S
              value: "10"
            # Pre-Decide Gate: act khi confidence >= 0.45 (BOCPD luôn ra anomaly sev 0.95;
            # BARO RCA single-metric hay trả conf 0.5 -> hạ ngưỡng để tự xử thay vì escalate).
            # Safety Gate 6-check + verify vẫn gác. Production siết về 0.8.
            - name: GATE_CONF_DISCARD
              value: "0.3"
            - name: GATE_CONF_EXECUTE
              value: "0.45"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
