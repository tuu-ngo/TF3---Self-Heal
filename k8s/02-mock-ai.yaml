# Mock AI server (tạm hôm nay) — chạy mock_ai_server.py từ image executor.
# Service 'ai-engine' khớp AI_BASE_URL của executor. Mai swap sang image AI thật.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: self-heal-system
  labels:
    app: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: 012619468490.dkr.ecr.us-east-1.amazonaws.com/cdo-executor:v3
          command: ["python", "mock_ai_server.py"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: self-heal-system
  labels:
    app: ai-engine
spec:
  selector:
    app: ai-engine
  ports:
    - port: 8080
      targetPort: 8080
