# ServiceAccount cho AI Engine — CHỈ plumbing IRSA (CDO cấp), KHÔNG phải workload AI.
# AI team bàn giao Deployment riêng; SA này để pod AI assume role gọi Bedrock/S3/DDB/SecretsManager.
# Role do Terraform module iam/ tạo (trust: self-heal-system:ai-engine).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-engine
  namespace: self-heal-system
  labels:
    app: ai-engine
  annotations:
    # Lấy ARN thật bằng `terraform output ai_engine_role_arn`.
    eks.amazonaws.com/role-arn: arn:aws:iam::938145531618:role/cdo-ai-engine-irsa-cdo-eks-cluster-dev
