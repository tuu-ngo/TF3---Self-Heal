# NetworkPolicy — Local Trust (deployment-contract §5.A).
# Executor (self-heal-system, app=cdo-self-heal-controller) → AI Engine :8080.
# Mọi ingress khác vào self-heal-system bị block.
# Lưu ý: executor đặt trong `self-heal-system` theo contract §3.D (resolve A-01).

---
# Default deny all ingress vào self-heal-system
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: self-heal-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow: executor pod (cùng namespace self-heal-system, app=cdo-self-heal-controller)
#        → AI Engine pod (app=ai-engine) port 8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-executor-to-ai
  namespace: self-heal-system
spec:
  podSelector:
    matchLabels:
      app: ai-engine
  policyTypes:
    - Ingress
  ingress:
    - from:
        # cùng namespace → chỉ cần podSelector (không cần namespaceSelector)
        - podSelector:
            matchLabels:
              app: cdo-self-heal-controller
      ports:
        - protocol: TCP
          port: 8080
