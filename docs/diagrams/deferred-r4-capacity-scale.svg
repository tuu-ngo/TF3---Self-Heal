<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box{rx:8;ry:8;stroke-width:1.5}
    .ai{fill:#eef4ff;stroke:#3b6cff}
    .cdo{fill:#eefaf0;stroke:#2fa34a}
    .git{fill:#fff4e6;stroke:#e8890c}
    .k8s{fill:#f3eefb;stroke:#7d4fd6}
    .stub{fill:#fdeaea;stroke:#d64545;stroke-dasharray:6 4}
    .t{font-size:13px;fill:#1a1a1a}
    .tb{font-size:14px;font-weight:600;fill:#1a1a1a}
    .lbl{font-size:11px;fill:#555}
    .hdr{font-size:18px;font-weight:700;fill:#1a1a1a}
    .sub{font-size:12px;fill:#666}
    .arrow{stroke:#555;stroke-width:1.6;fill:none;marker-end:url(#a)}
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="24" y="34" class="hdr">R4 — CapacityScaleRunbook  ·  pattern_type: deferred  ·  SCALE_REPLICAS</text>
  <text x="24" y="54" class="sub">Trigger: queue_backlog / service_throughput_rps cao. CDO KHÔNG mutate K8s trực tiếp — đi qua Git → ArgoCD.  (DESIGN-ONLY: Git ops còn là stub, xem ADR-008)</text>

  <!-- Telemetry -->
  <rect class="box cdo" x="24" y="90" width="180" height="70"/>
  <text x="34" y="116" class="tb">Telemetry signal</text>
  <text x="34" y="136" class="t">queue_backlog=15000</text>
  <text x="34" y="152" class="lbl">system=K8S_NATIVE · ns=tenant-a</text>

  <!-- Detect -->
  <rect class="box ai" x="250" y="90" width="150" height="70"/>
  <text x="260" y="116" class="tb">AI /v1/detect</text>
  <text x="260" y="136" class="t">anomaly=true</text>
  <text x="260" y="152" class="lbl">fault=capacity · sev 0.8</text>

  <!-- Pre-decide gate -->
  <rect class="box cdo" x="446" y="90" width="150" height="70"/>
  <text x="456" y="116" class="tb">CDO Pre-Decide</text>
  <text x="456" y="136" class="t">conf ≥ 0.8 → decide</text>

  <!-- Decide -->
  <rect class="box ai" x="642" y="90" width="314" height="70"/>
  <text x="652" y="116" class="tb">AI /v1/decide  →  matched_runbook</text>
  <text x="652" y="136" class="t">CapacityScaleRunbook · pattern_type=deferred</text>
  <text x="652" y="152" class="lbl">action=SCALE_REPLICAS params{replicas:1–10}</text>

  <line class="arrow" x1="204" y1="125" x2="248" y2="125"/>
  <line class="arrow" x1="400" y1="125" x2="444" y2="125"/>
  <line class="arrow" x1="596" y1="125" x2="640" y2="125"/>

  <!-- Safety gate -->
  <rect class="box cdo" x="642" y="200" width="314" height="60"/>
  <text x="652" y="226" class="tb">CDO Safety Gate (6 check)</text>
  <text x="652" y="246" class="t">deferred routing OK · 1≤replicas≤10 · tenant match</text>
  <line class="arrow" x1="799" y1="160" x2="799" y2="198"/>

  <!-- Deferred branch: Git -->
  <rect class="box stub" x="642" y="300" width="314" height="80"/>
  <text x="652" y="326" class="tb">CDO deferred executor  (STUB / designed-only)</text>
  <text x="652" y="346" class="t">git commit: helm values replicas 3→6</text>
  <text x="652" y="364" class="lbl">executors/deferred.py — auto Git ops chưa bật (W12 risk)</text>
  <line class="arrow" x1="799" y1="260" x2="799" y2="298"/>

  <!-- ArgoCD -->
  <rect class="box git" x="360" y="310" width="200" height="70"/>
  <text x="370" y="336" class="tb">ArgoCD</text>
  <text x="370" y="356" class="t">detect drift → sync</text>
  <text x="370" y="372" class="lbl">Git = source of truth</text>
  <line class="arrow" x1="640" y1="345" x2="562" y2="345"/>

  <!-- K8s -->
  <rect class="box k8s" x="80" y="310" width="200" height="70"/>
  <text x="90" y="336" class="tb">Kubernetes (tenant-a)</text>
  <text x="90" y="356" class="t">Deployment scaled → 6</text>
  <text x="90" y="372" class="lbl">replicas Ready</text>
  <line class="arrow" x1="358" y1="345" x2="282" y2="345"/>

  <!-- Verify -->
  <rect class="box ai" x="80" y="430" width="200" height="70"/>
  <text x="90" y="456" class="tb">AI /v1/verify</text>
  <text x="90" y="476" class="t">queue_backlog giảm → DONE</text>
  <text x="90" y="492" class="lbl">else RETRY / ROLLBACK(revert commit)</text>
  <line class="arrow" x1="180" y1="380" x2="180" y2="428"/>

  <!-- Audit -->
  <rect class="box cdo" x="360" y="430" width="360" height="70"/>
  <text x="370" y="456" class="tb">CDO Audit (S3 Object Lock + CloudWatch Logs Insights)</text>
  <text x="370" y="476" class="t">1 chuỗi event theo correlation_id → auto_resolved</text>
  <line class="arrow" x1="280" y1="465" x2="358" y2="465"/>
</svg>
