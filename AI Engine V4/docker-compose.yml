services:
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf3-ai-engine
    ports:
      - "${API_PORT:-8050}:${API_PORT:-8050}"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=${API_PORT:-8050}
    volumes:
      # Optional: Mount local source files for hot reloading / debugging during local composition
      - ./src:/app/src
      - ./adr:/app/adr
    restart: unless-stopped
