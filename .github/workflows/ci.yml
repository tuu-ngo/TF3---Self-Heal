name: CI — 4 Quality Gates

# 4 cửa ải (WORK_RULE §I): ruff + pytest (+coverage) + tfsec + gitleaks.
# Đặt cả 4 job làm "Required status checks" trong Branch protection của `main`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------- Cửa 1a — Python lint ----------
  ruff:
    name: "Cửa 1 · ruff (Python lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: executor          # ruff check executor/ (config: executor/ruff.toml)

  # ---------- Cửa 2 — Unit test + coverage ----------
  pytest:
    name: "Cửa 2 · pytest (coverage ≥70%)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r executor/requirements.txt
          pip install pytest pytest-cov
      - name: pytest + coverage
        working-directory: executor
        env:
          CDO_K8S_MOCK: "true"   # không gọi cloud/cluster thật trong CI
        run: |
          pytest -q \
            --cov=safety_gate \
            --cov-report=term-missing \
            --cov-fail-under=70
          # Khi viết thêm test: mở rộng --cov (vd --cov=safety_gate --cov=pre_decide_gate ...)

  # ---------- Cửa 1b — IaC security scan ----------
  tfsec:
    name: "Cửa 1 · tfsec (IaC security)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infra
          # Chỉ FAIL ở mức CRITICAL (khớp DoD "no CRITICAL"); HIGH/MEDIUM hiện cảnh báo.
          additional_args: --minimum-severity CRITICAL

  # ---------- Cửa 1c — Secret scan ----------
  gitleaks:
    name: "Cửa 1 · gitleaks (secret scan)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # quét toàn bộ lịch sử commit của PR
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo org cần GITLEAKS_LICENSE; repo cá nhân/public dùng free.
